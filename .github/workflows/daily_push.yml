name: 每日新闻推送
on:
  schedule:
    # ⚠️ 这里是UTC时间，北京时间=UTC+8
    # 比如想每天早上8点推送，就填 0 0 * * * （UTC0点=北京8点）
    # 想每天晚上6点推送，就填 0 10 * * * （UTC10点=北京18点）
    - cron: '0 10 * * *'
  workflow_dispatch: # 这一行保留，允许我们手动测试

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: 安装必要工具
        run: pip install requests
      - name: 执行新闻推送
        run: python news_push.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
